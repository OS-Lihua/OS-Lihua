<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      @keyframes glitch-1 {
        0%, 100% { clip-path: inset(0% 0% 100% 0%); transform: translate(0); }
        20% { clip-path: inset(10% 0% 60% 0%); transform: translate(-2px, 2px); }
        40% { clip-path: inset(30% 0% 58% 0%); transform: translate(2px, -2px); }
        60% { clip-path: inset(50% 0% 30% 0%); transform: translate(-2px, 0); }
        80% { clip-path: inset(70% 0% 20% 0%); transform: translate(2px, 2px); }
      }
      @keyframes glitch-2 {
        0%, 100% { clip-path: inset(0% 0% 0% 100%); }
        20% { clip-path: inset(0% 0% 0% 50%); }
        40% { clip-path: inset(0% 0% 0% 70%); }
        60% { clip-path: inset(0% 0% 0% 30%); }
        80% { clip-path: inset(0% 0% 0% 60%); }
      }
      @keyframes scanlines {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100%); }
      }
      @keyframes pulse-cyan {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      .glitch-text-main {
        animation: glitch-1 4s infinite;
        fill: #00fff2;
        font-size: 72px;
        font-weight: bold;
        font-family: 'Monaco', 'Courier New', monospace;
        letter-spacing: 4px;
      }
      .glitch-text-sub {
        animation: glitch-2 3s infinite;
        fill: #ff00ff;
        font-size: 20px;
        font-family: 'Monaco', 'Courier New', monospace;
        letter-spacing: 2px;
      }
      .scanline {
        animation: scanlines 6s linear infinite;
        opacity: 0.15;
      }
      .base-text {
        fill: #00fff2;
        font-size: 72px;
        font-weight: bold;
        font-family: 'Monaco', 'Courier New', monospace;
        letter-spacing: 4px;
        opacity: 0.3;
      }
      .sub-text {
        fill: #ff00ff;
        font-size: 20px;
        font-family: 'Monaco', 'Courier New', monospace;
        letter-spacing: 2px;
        opacity: 0.3;
      }
      .accent-dot {
        animation: pulse-cyan 2s infinite;
      }
      .address-text {
        fill: #7000ff;
        font-size: 14px;
        font-family: 'Monaco', 'Courier New', monospace;
        opacity: 0.8;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="#0a0a0f"/>

  <!-- Pixel Grid Background -->
  <defs>
    <pattern id="pixelgrid" x="20" y="20" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="19" height="19" fill="none" stroke="#1a0033" stroke-width="1" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="300" fill="url(#pixelgrid)"/>

  <!-- Gradient Overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00fff2;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#grad1)"/>

  <!-- Glowing Circles (decorative) -->
  <circle cx="100" cy="50" r="40" fill="none" stroke="#00fff2" stroke-width="2" opacity="0.3"/>
  <circle cx="100" cy="50" r="35" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.2"/>
  <circle cx="1100" cy="250" r="50" fill="none" stroke="#7000ff" stroke-width="2" opacity="0.3"/>
  <circle cx="1100" cy="250" r="45" fill="none" stroke="#00fff2" stroke-width="1" opacity="0.2"/>

  <!-- Central Text with Glitch Effect -->
  <!-- Base layer (shadow) -->
  <text class="base-text" x="60" y="130">0xYaCo</text>
  <text class="sub-text" x="70" y="170">PRODUCT ARCHITECT × WEB3 BUILDER</text>

  <!-- Glitch layers -->
  <text class="glitch-text-main" x="60" y="130">0xYaCo</text>
  <text class="glitch-text-sub" x="70" y="170">PRODUCT ARCHITECT × WEB3 BUILDER</text>

  <!-- Scanline Effect -->
  <g class="scanline">
    <rect x="0" y="0" width="1200" height="20" fill="white" opacity="0.1"/>
  </g>

  <!-- Accent Elements -->
  <g>
    <!-- Left accent line -->
    <line x1="40" y1="90" x2="40" y2="220" stroke="#00fff2" stroke-width="3" opacity="0.6"/>
    <circle cx="40" cy="90" r="6" fill="#00fff2" class="accent-dot"/>
    <circle cx="40" cy="220" r="6" fill="#ff00ff" class="accent-dot"/>
  </g>

  <!-- Right side address style text -->
  <g>
    <text class="address-text" x="980" y="270">// 0x1337</text>
    <rect x="975" y="260" width="200" height="25" fill="none" stroke="#7000ff" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Corner Brackets -->
  <g stroke="#00fff2" stroke-width="2" fill="none" opacity="0.4">
    <!-- Top left -->
    <polyline points="20,20 50,20 50,50"/>
    <!-- Top right -->
    <polyline points="1180,20 1150,20 1150,50"/>
    <!-- Bottom left -->
    <polyline points="20,280 50,280 50,250"/>
    <!-- Bottom right -->
    <polyline points="1180,280 1150,280 1150,250"/>
  </g>

  <!-- Floating Particles (static, but styled to look animated) -->
  <g opacity="0.3">
    <circle cx="200" cy="80" r="2" fill="#ff00ff"/>
    <circle cx="400" cy="180" r="1.5" fill="#00fff2"/>
    <circle cx="600" cy="120" r="1" fill="#7000ff"/>
    <circle cx="800" cy="220" r="2" fill="#ff00ff"/>
    <circle cx="900" cy="60" r="1.5" fill="#00fff2"/>
  </g>
</svg>
