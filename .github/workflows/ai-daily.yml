name: AI Daily Oracle

on:
  schedule:
    - cron: '0 8 * * *'  # Every day at 08:00 UTC
  workflow_dispatch:      # Manual trigger

permissions:
  contents: write

jobs:
  ai-daily:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic google-generativeai openai

      - name: Generate AI content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 << 'EOF'
          import os
          import json
          from datetime import datetime

          def get_claude_content():
              """Generate content from Claude API"""
              from anthropic import Anthropic

              api_key = os.getenv('ANTHROPIC_API_KEY')
              if not api_key:
                  return None

              try:
                  client = Anthropic()
                  message = client.messages.create(
                      model="claude-3-5-sonnet-20241022",
                      max_tokens=200,
                      messages=[
                          {
                              "role": "user",
                              "content": """You are 0xYaCo, a cyberpunk-style Web3 builder and security researcher.
              Generate a short aphorism or technical insight in BOTH Chinese and English (one sentence each).
              Style: hacker/geek tone, related to Web3, AI, code, security, or product architecture.
              Max 30 characters per language. Avoid emojis.

              Format your response exactly as:
              CN: [Chinese insight]
              EN: [English insight]"""
                          }
                      ]
                  )
                  return message.content[0].text
              except Exception as e:
                  print(f"Claude error: {e}")
                  return None

          def get_gemini_content():
              """Generate content from Gemini API"""
              import google.generativeai as genai

              api_key = os.getenv('GEMINI_API_KEY')
              if not api_key:
                  return None

              try:
                  genai.configure(api_key=api_key)
                  model = genai.GenerativeModel('gemini-2.0-flash')
                  response = model.generate_content(
                      """You are 0xYaCo, a cyberpunk-style Web3 builder and security researcher.
              Generate a short aphorism or technical insight in BOTH Chinese and English (one sentence each).
              Style: hacker/geek tone, related to blockchain, Web3 inspiration, or data truth.
              Max 30 characters per language. Avoid emojis.

              Format your response exactly as:
              CN: [Chinese insight]
              EN: [English insight]"""
                  )
                  return response.text
              except Exception as e:
                  print(f"Gemini error: {e}")
                  return None

          def get_gpt_content():
              """Generate content from GPT API"""
              from openai import OpenAI

              api_key = os.getenv('OPENAI_API_KEY')
              if not api_key:
                  return None

              try:
                  client = OpenAI(api_key=api_key)
                  response = client.chat.completions.create(
                      model="gpt-4o-mini",
                      max_tokens=150,
                      messages=[
                          {
                              "role": "user",
                              "content": """You are 0xYaCo, a hacker and security researcher.
              Generate a short hacker aphorism or motivational quote in English only.
              Style: paranoid, ambitious, cyberpunk.
              Max 25 words.

              Format: Just the quote, nothing else."""
                          }
                      ]
                  )
                  return response.choices[0].message.content
              except Exception as e:
                  print(f"GPT error: {e}")
                  return None

          # Determine which AI to use based on day of week
          day_of_week = datetime.now().weekday()  # 0=Monday, 6=Sunday
          ai_rotation = {
              0: ("Claude", get_claude_content),
              1: ("Gemini", get_gemini_content),
              2: ("GPT", get_gpt_content),
              3: ("Claude", get_claude_content),
              4: ("Gemini", get_gemini_content),
              5: ("GPT", get_gpt_content),
              6: ("Claude", get_claude_content),
          }

          ai_name, ai_func = ai_rotation[day_of_week]
          print(f"Today's AI: {ai_name}")

          content = ai_func()
          if not content:
              print(f"Failed to get content from {ai_name}, using fallback")
              # Fallback content if API fails
              if ai_name == "Claude":
                  content = "CN: 构建是最好的学习\nEN: Build is the best learning"
              elif ai_name == "Gemini":
                  content = "CN: 链上数据是最诚实的历史\nEN: On-chain data is honest truth"
              else:
                  content = "Stay hungry, stay paranoid."

          # Parse content
          if "CN:" in content and "EN:" in content:
              lines = content.split('\n')
              cn_line = next((l for l in lines if l.startswith('CN:')), None)
              en_line = next((l for l in lines if l.startswith('EN:')), None)

              cn_text = cn_line.replace('CN:', '').strip() if cn_line else ""
              en_text = en_line.replace('EN:', '').strip() if en_line else ""

              ai_content = f'```\n[{ai_name}] "{en_text}"\n\n[{ai_name}] "{cn_text}"\n```'
          else:
              ai_content = f'```\n[{ai_name}] {content}\n```'

          print("\nGenerated content:")
          print(ai_content)

          # Save to file
          with open("/tmp/ai_content.txt", "w") as f:
              f.write(ai_content)

          EOF

      - name: Update README.md
        run: |
          python3 << 'EOF'
          import re

          with open("README.md", "r") as f:
              content = f.read()

          ai_content = open("/tmp/ai_content.txt").read()

          # Replace AI content between markers
          content = re.sub(
              r'<!-- AI:START -->.*?<!-- AI:END -->',
              f'<!-- AI:START -->\n{ai_content}\n<!-- AI:END -->',
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w") as f:
              f.write(content)

          print("Updated README.md")
          EOF

      - name: Update README.zh.md
        run: |
          python3 << 'EOF'
          import re

          with open("README.zh.md", "r") as f:
              content = f.read()

          ai_content = open("/tmp/ai_content.txt").read()

          # Replace AI content between markers
          content = re.sub(
              r'<!-- AI:START -->.*?<!-- AI:END -->',
              f'<!-- AI:START -->\n{ai_content}\n<!-- AI:END -->',
              content,
              flags=re.DOTALL
          )

          with open("README.zh.md", "w") as f:
              f.write(content)

          print("Updated README.zh.md")
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          if git diff --quiet README.md README.zh.md; then
            echo "No changes to commit"
          else
            git add README.md README.zh.md
            git commit -m "chore: update daily AI oracle"
            git push
          fi
